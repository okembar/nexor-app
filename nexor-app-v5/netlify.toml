[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API Claude (Log Analyzer) ────────────────────────────────────────
[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze"
  status = 200

# ── API Gemini (Assistant IA) ─────────────────────────────────────────
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/gemini"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
